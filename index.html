<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>企劃任務牆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f0e8;
  --bg2:#ede7da;
  --surface:#fdfaf5;
  --surface2:#f7f2ea;
  --border:#ddd5c4;
  --border2:#c9bfad;
  --ink:#2c2416;
  --ink2:#6b5f4e;
  --ink3:#a8998a;
  --green:#2e7d52;
  --green-dim:#d4ead e;
  --green-bg:rgba(46,125,82,.1);
  --green-light:#e8f4ed;
  --yellow:#b36d00;
  --yellow-bg:rgba(179,109,0,.1);
  --yellow-light:#fdf3e3;
  --red:#c0392b;
  --red-bg:rgba(192,57,43,.1);
  --red-light:#fdecea;
  --blue:#1a5f8a;
  --blue-bg:rgba(26,95,138,.1);
  --blue-light:#e8f1f7;
  --purple:#6b3fa0;
  --purple-bg:rgba(107,63,160,.1);
  --purple-light:#f0ebf8;
  --accent:#c4843a;
  --accent-bg:rgba(196,132,58,.1);
  --radius:10px;
  --radius-lg:16px;
  --shadow:0 2px 12px rgba(44,36,22,.08);
  --shadow-lg:0 4px 24px rgba(44,36,22,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;min-height:100vh;line-height:1.5}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ── TOPBAR ── */
.topbar{height:54px;background:var(--surface);border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar-logo{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green);letter-spacing:.06em;background:var(--green-light);padding:4px 10px;border-radius:6px}
.topbar-title{font-size:14px;font-weight:700;color:var(--ink2)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar-member{font-size:12px;color:var(--ink2);background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:100px}

/* ── WRAP ── */
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px}

/* ── SCENE ── */
.scene{animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.scene-title{font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px}

/* ── TEAM GRID ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.team-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:22px 18px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)}
.team-card:hover{border-color:var(--green);background:var(--green-light);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.team-card .tc-icon{font-size:30px}
.team-card .tc-name{font-weight:900;font-size:15px;color:var(--ink)}
.team-card .tc-sub{font-size:11px;color:var(--ink3)}

/* ── MEMBER ── */
.member-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.member-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:100px;padding:10px 22px;cursor:pointer;font:600 13px 'Noto Sans TC',sans-serif;color:var(--ink);transition:.15s;box-shadow:var(--shadow)}
.member-btn:hover,.member-btn.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 4px 12px rgba(46,125,82,.3)}

/* ── STAT STRIP ── */
.stat-strip{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 18px;font-size:12px;box-shadow:var(--shadow);cursor:default}
.stat-pill .sp-num{font-family:'JetBrains Mono',monospace;font-weight:900;font-size:18px;line-height:1}
.stat-pill .sp-label{color:var(--ink2);font-size:11px}
.stat-pill.overdue{border-color:#f5c6c2;background:var(--red-light)} .stat-pill.overdue .sp-num{color:var(--red)}
.stat-pill.modify{border-color:#fde4b8;background:var(--yellow-light)} .stat-pill.modify .sp-num{color:var(--yellow)}
.stat-pill.active{border-color:#c8dff0;background:var(--blue-light)} .stat-pill.active .sp-num{color:var(--blue)}
.stat-pill.confirm{border-color:#ddd0f0;background:var(--purple-light)} .stat-pill.confirm .sp-num{color:var(--purple)}
.stat-pill.making{border-color:var(--border)} .stat-pill.making .sp-num{color:var(--ink2)}
.stat-pill.done{border-color:#c0dfc8;background:var(--green-light)} .stat-pill.done .sp-num{color:var(--green)}

/* ── GANTT ── */
.gantt-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow)}
.gantt-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2)}
.gantt-head-title{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:.04em}
.gantt-scroll{overflow-x:auto}
.gantt-table{border-collapse:collapse;width:100%;min-width:700px}
.gantt-table th{font-size:10px;font-weight:700;color:var(--ink3);padding:6px 8px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;text-align:center}
.gantt-table th.today-col{color:var(--green);background:#e8f4ed;border-bottom-color:var(--green)}
.gantt-table td{padding:3px 4px;border-bottom:1px solid var(--bg2);vertical-align:middle}
.gantt-table td.row-label{font-size:11px;color:var(--ink2);white-space:nowrap;padding:3px 10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;background:var(--surface)}
.gantt-bar{height:20px;border-radius:4px;font-size:9px;display:flex;align-items:center;padding:0 6px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gbar-video{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.gbar-thread{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd}
.gbar-overdue{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.gbar-done{background:#dcfce7;color:#166534;border:1px solid #86efac}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:100px;padding:6px 14px;font:500 12px 'Noto Sans TC',sans-serif;color:var(--ink2);cursor:pointer;transition:.12s}
.filter-btn:hover{border-color:var(--border2);color:var(--ink)}
.filter-btn.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}
.filter-search{background:var(--surface);border:1.5px solid var(--border);border-radius:100px;padding:6px 14px;font:14px 'Noto Sans TC',sans-serif;color:var(--ink);outline:none;width:180px;transition:.12s}
.filter-search:focus{border-color:var(--green)}
.filter-search::placeholder{color:var(--ink3)}

/* ── SECTION HEADER ── */
.section-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 8px;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.section-hdr::after{content:'';flex:1;height:1.5px;background:var(--border)}
.section-hdr.video-hdr{color:var(--blue)}
.section-hdr.thread-hdr{color:var(--purple)}

/* ── TASK ROW ── */
.task-row{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden;transition:.12s;box-shadow:var(--shadow)}
.task-row:hover{border-color:var(--border2);box-shadow:var(--shadow-lg)}
.task-row.overdue{border-left:4px solid var(--red)}
.task-row.modify{border-left:4px solid var(--yellow)}
.task-row.confirm{border-left:4px solid var(--purple)}
.task-row.making{border-left:4px solid var(--ink3)}
.task-row.active{border-left:4px solid var(--blue)}

.task-head{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;flex-wrap:wrap;gap:6px}
.task-head:hover{background:var(--surface2)}
.task-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink3);background:var(--bg2);border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.task-brand{font-size:12px;font-weight:700;color:var(--ink);flex-shrink:0}
.task-product{font-size:12px;color:var(--ink2)}
.task-persona{font-size:10px;color:var(--purple);background:var(--purple-light);border:1px solid #ddd0f0;border-radius:4px;padding:2px 7px;flex-shrink:0}
.task-feedback{font-size:10px;color:var(--yellow);background:var(--yellow-light);border:1px solid #fde4b8;border-radius:4px;padding:2px 7px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}

.badge{display:inline-flex;align-items:center;border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.badge.overdue{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5}
.badge.modify{background:var(--yellow-bg);color:var(--yellow);border:1px solid #fcd49a}
.badge.active{background:var(--blue-bg);color:var(--blue);border:1px solid #93c5fd}
.badge.confirm{background:var(--purple-bg);color:var(--purple);border:1px solid #c4b5fd}
.badge.making{background:var(--bg2);color:var(--ink2);border:1px solid var(--border)}
.badge.done{background:var(--green-bg);color:var(--green);border:1px solid #86efac}

.task-due{font-size:11px;color:var(--ink3);margin-left:auto;white-space:nowrap;flex-shrink:0}
.task-chevron{font-size:14px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.task-row.open .task-chevron{transform:rotate(90deg)}

/* ── EDIT PANEL ── */
.edit-panel{display:none;border-top:1.5px solid var(--border);background:var(--surface2)}
.task-row.open .edit-panel{display:block}
.edit-inner{padding:16px}
.ep-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ep-full{grid-column:1/-1}
.field-label{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.field-value-box{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.6;white-space:pre-wrap;color:var(--ink2);min-height:36px}
.ep-divider{grid-column:1/-1;border:none;border-top:1.5px dashed var(--border2);margin:4px 0}
.ep-section-label{grid-column:1/-1;font-size:10px;font-weight:900;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;padding-top:4px}

select,textarea,input[type=text]{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--ink);font:14px 'Noto Sans TC',sans-serif;padding:9px 11px;outline:none;transition:.12s;appearance:auto}
select:focus,textarea:focus,input[type=text]:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(46,125,82,.12)}
textarea{resize:vertical;min-height:88px;line-height:1.6}

.link-field-wrap{display:flex;gap:6px;align-items:center}
.link-field-wrap input{flex:1}
.link-preview{font-size:11px;color:var(--blue);margin-top:4px;word-break:break-all}
.link-preview a{color:var(--blue)}

.img-thumb{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;background:var(--bg2)}

.product-summary{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.7;color:var(--ink2)}
.product-summary strong{color:var(--ink);display:block;margin-bottom:4px;font-size:10px;letter-spacing:.06em;text-transform:uppercase}

/* ── ACTIONS ── */
.edit-actions{display:flex;gap:8px;align-items:center;padding:12px 16px;border-top:1.5px solid var(--border);background:var(--bg2)}
.btn{border:none;border-radius:8px;padding:10px 22px;font:700 13px 'Noto Sans TC',sans-serif;cursor:pointer;transition:.15s;letter-spacing:.02em}
.btn-save{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(46,125,82,.3)}
.btn-save:hover{background:#245f3f;transform:translateY(-1px)}
.btn-save:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-cancel{background:transparent;border:1.5px solid var(--border);color:var(--ink2)}
.btn-cancel:hover{border-color:var(--border2);color:var(--ink)}
.edit-btn{border:1.5px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--ink2);font:600 11px 'Noto Sans TC',sans-serif;padding:5px 12px;cursor:pointer;transition:.12s;flex-shrink:0;white-space:nowrap;margin-left:auto}
.edit-btn:hover{background:var(--green);border-color:var(--green);color:#fff}

.saving-msg{font-size:12px;color:var(--ink3)}
.edit-btn{border:1.5px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--ink2);font:600 11px 'Noto Sans TC',sans-serif;padding:5px 12px;cursor:pointer;transition:.12s;flex-shrink:0;white-space:nowrap}
.edit-btn:hover{background:var(--green);border-color:var(--green);color:#fff}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;place-items:center;z-index:999;cursor:pointer}
.lightbox.show{display:grid}
.lightbox img{max-width:92vw;max-height:90vh;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.5)}

/* ── TOAST ── */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--bg);border:1px solid var(--border2);padding:11px 20px;border-radius:12px;opacity:0;transition:.22s;z-index:999;font-size:13px;max-width:90vw;text-align:center;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADER / EMPTY ── */
.loader{padding:48px;text-align:center;color:var(--ink3);font-size:13px}
.empty{padding:36px;text-align:center;color:var(--ink3);font-size:13px;border:1.5px dashed var(--border);border-radius:var(--radius);margin:8px 0;background:var(--surface)}

/* ── BREADCRUMB ── */
.crumbs{display:flex;align-items:center;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.crumb{font-size:12px;color:var(--ink3);padding:3px 8px;border-radius:6px}
.crumb.link{cursor:pointer;color:var(--ink2);text-decoration:underline;text-underline-offset:2px}
.crumb.link:hover{color:var(--green)}
.crumb.current{color:var(--ink);font-weight:700;background:var(--surface);border:1px solid var(--border)}
.crumb-sep{color:var(--border2)}

/* ── PANEL ── */
.panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}

@media(max-width:640px){
  .ep-grid{grid-template-columns:1fr}
  .ep-full{grid-column:1}
  .stat-strip{gap:6px}
  .gantt-wrap{display:none}
  .task-head{gap:4px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">⬡ 308</div>
  <div class="topbar-title">企劃任務牆</div>
  <div class="topbar-right">
    <span id="topMember" class="topbar-member" style="display:none"></span>
  </div>
</div>

<div class="wrap">
  <div id="crumbs" class="crumbs"></div>

  <!-- 選小隊 -->
  <div id="sceneTeam" class="scene">
    <div class="scene-title">選擇小隊</div>
    <div id="teamGrid" class="team-grid"><div class="loader">載入中…</div></div>
  </div>

  <!-- 選成員 -->
  <div id="sceneMember" class="scene" style="display:none">
    <div class="scene-title">選擇成員</div>
    <div id="memberGrid" class="member-grid"><div class="loader">載入中…</div></div>
    <div id="teamOverview" style="margin-top:20px"></div>
  </div>

  <!-- 任務牆 -->
  <div id="sceneTask" class="scene" style="display:none">
    <div id="statStrip" class="stat-strip"></div>
    <div id="ganttWrap" class="gantt-wrap" style="display:none">
      <div class="gantt-head"><span class="gantt-head-title">📅 兩週甘特</span></div>
      <div class="gantt-scroll"><table id="ganttTable" class="gantt-table"></table></div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-brand="all" onclick="setBrandFilter(this,'all')">全部品牌</button>
      <span id="brandFilters" style="display:contents"></span>
      <span style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
        <button class="filter-btn active" data-type="all" onclick="setTypeFilter(this,'all')">全部</button>
        <button class="filter-btn" data-type="video" onclick="setTypeFilter(this,'video')">🎬 影音</button>
        <button class="filter-btn" data-type="thread" onclick="setTypeFilter(this,'thread')">🧵 脆</button>
      </span>
      <input class="filter-search" type="text" placeholder="搜尋品牌/商品…" oninput="setSearch(this.value)"/>
    </div>
    <div id="taskWall"></div>
  </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLB()"><img id="lbImg" alt=""/></div>
<div id="toast" class="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx7VURGqniyIFhSk4MfkDkcmmZPV5YCPwzbc1OeiHW3-JR7wrL8oeXMpmsys-xLvUCA4g/exec';

const S = {
  team:'', member:'',
  tasks:{ video:[], thread:[] },
  filter:{ brand:'all', type:'all', search:'' },
};

const VIDEO_PERSONAS = ['','分享愛用好物','分享日常生活好物','分享保養品美妝好物','分享健康保健食品','分享美食跑咖'];
const THREAD_PERSONAS = ['','女 02年 追星女 分享愛用','女 01年 社畜 分享愛用小物','女 美妝保養','女 分享愛用物','女 追韓娛 分享愛用','女 99年 追韓娛 分享愛用','男 26 想賺錢的社畜 發過投顧','已婚女性 年輕媽媽 無子','已婚男性 年輕爸爸 無子','有女友 30歲 幽默老闆','有男友 35歲 女強人','已婚女性 兩寶媽媽','已婚女性 一寶爸爸','單身狗 狗'];
// ★ 狀態第一個是空白，預設不選
const STATUS_OPTS  = ['','客戶尚未確認','客戶已回需修改','修改完成，需確認','確認完畢'];
const VSTATUS_OPTS = ['','影片需確認','需修改','修改稿需確認','確認完畢'];

// ─── API ───────────────────────────────────────────────────
async function api(action, params={}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('mode', 'planner');
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v ?? ''));
  const r = await fetch(url.toString());
  const d = await r.json();
  if (d.ok === false) throw new Error(d.error || 'API error');
  return d;
}
async function apiPost(body) {
  // GAS 不支援跨域 POST（CORS preflight 被擋）
  // 改用 GET + query string 傳所有參數
  const url = new URL(GAS_URL);
  url.searchParams.set('mode', 'planner');
  Object.entries({...body}).forEach(([k,v]) => {
    if (v !== undefined && v !== null) url.searchParams.set(k, String(v));
  });
  const r = await fetch(url.toString());
  const d = await r.json();
  if (d.ok === false) throw new Error(d.error || 'API error');
  return d;
}

// ─── 狀態計算 ──────────────────────────────────────────────
function taskStatus(t, type) {
  // 優先用客戶表的狀態（'狀態' 欄），fallback 主控表的 status 欄
  const s  = t['狀態'] || t.status || '';
  const vs = t['影片-狀態'] || t.videoStatus || '';
  const due = parseDateTW(t.dueDate);
  const now = new Date(); now.setHours(0,0,0,0);
  const isOverdue = due && due < now;

  if (type === 'thread') {
    if (s === '確認完畢')          return { key:'done',    label:'確認完畢',   cls:'done' };
    if (s === '客戶已回需修改')    return { key:'modify',  label:'腳本待修改', cls:'modify' };
    if (s === '客戶尚未確認' || s === '修改完成，需確認') return { key:'confirm', label:'客戶確認中', cls:'confirm' };
    // 空白 = 腳本進行中
    if (isOverdue)                 return { key:'overdue', label:'已逾期',     cls:'overdue' };
    return { key:'active', label:'腳本進行中', cls:'active' };
  } else {
    if (s === '確認完畢') {
      if (vs === '確認完畢')                              return { key:'done',    label:'全部完成',       cls:'done' };
      if (vs === '需修改')                                return { key:'modify',  label:'影片待修改',     cls:'modify' };
      if (vs === '影片需確認' || vs === '修改稿需確認')   return { key:'confirm', label:'影片確認中',     cls:'confirm' };
      // 腳本OK，影片狀態空白 = 影片製作中
      return { key:'making', label:'影片製作中', cls:'making' };
    }
    if (s === '客戶已回需修改')    return { key:'modify',  label:'腳本待修改',   cls:'modify' };
    if (s === '客戶尚未確認' || s === '修改完成，需確認') return { key:'confirm', label:'客戶確認中',     cls:'confirm' };
    // 空白 = 腳本進行中
    if (isOverdue)                 return { key:'overdue', label:'已逾期',       cls:'overdue' };
    return { key:'active', label:'腳本進行中', cls:'active' };
  }
}

function parseDateTW(str) {
  if (!str) return null;
  const m = str.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]);
}

async function loadTasks(member) {

  tm.textContent = member; tm.style.display='';

  // ★ 第一段：先快速從主控表抓清單（只有 taskId/brand/product/dueDate）

// ─── 統計 ──────────────────────────────────────────────────
function renderStats() {
  const all = [
    ...S.tasks.video.map(t=>({t,type:'video'})),
    ...S.tasks.thread.map(t=>({t,type:'thread'}))
  ];
  const counts = {overdue:0,modify:0,active:0,confirm:0,making:0,done:0};
  all.forEach(({t,type})=>{ const s=taskStatus(t,type); counts[s.key]=(counts[s.key]||0)+1; });
  const defs = [
    {key:'overdue',label:'已逾期',cls:'overdue',emoji:'🔴'},
    {key:'modify', label:'待修改',cls:'modify', emoji:'✏️'},
    {key:'active', label:'進行中',cls:'active', emoji:'🔵'},
    {key:'confirm',label:'確認中',cls:'confirm',emoji:'🟣'},
    {key:'making', label:'影片製作',cls:'making',emoji:'🎬'},
    {key:'done',   label:'完成',   cls:'done',  emoji:'✅'},
  ];
  g('statStrip').innerHTML = defs.map(({key,label,cls,emoji})=>
    `<div class="stat-pill ${cls}"><span class="sp-num">${counts[key]||0}</span><div><div class="sp-label">${emoji} ${label}</div></div></div>`
  ).join('');
}

// ─── 甘特 ──────────────────────────────────────────────────
function renderGantt() {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for (let i=-3; i<=13; i++) {
    const d = new Date(today); d.setDate(d.getDate()+i); days.push(d);
  }
  const all = [
    ...S.tasks.video.map(t=>({t,type:'video'})),
    ...S.tasks.thread.map(t=>({t,type:'thread'}))
  ].filter(({t,type})=>taskStatus(t,type).key!=='done');

  if (!all.length) { g('ganttWrap').style.display='none'; return; }
  g('ganttWrap').style.display='';

  const ths = `<tr><th style="text-align:left;min-width:120px;padding-left:10px">任務</th>${
    days.map(d=>{
      const isToday = d.getTime()===today.getTime();
      return `<th class="${isToday?'today-col':''}" style="min-width:28px">${d.getMonth()+1}/${d.getDate()}<br><span style="opacity:.6">${['日','一','二','三','四','五','六'][d.getDay()]}</span></th>`;
    }).join('')}</tr>`;

  const trs = all.slice(0,15).map(({t,type})=>{
    const due = parseDateTW(t.dueDate);
    const st  = taskStatus(t,type);
    const label = `${t.brand||''} ${t.product||''}`.trim();
    const cells = days.map(d=>{
      if (!due) return '<td></td>';
      if (Math.abs((due.getTime()-d.getTime())/86400000)<0.5) {
        const cls = st.key==='overdue'?'gbar-overdue':type==='video'?'gbar-video':'gbar-thread';
        return `<td><div class="gantt-bar ${cls}">${html(t.taskId.slice(-5))}</div></td>`;
      }
      return '<td></td>';
    }).join('');
    return `<tr><td class="row-label" title="${html(label)}">${html(label)}</td>${cells}</tr>`;
  }).join('');

  g('ganttTable').innerHTML = `<thead>${ths}</thead><tbody>${trs}</tbody>`;
}

// ─── 任務列表 ──────────────────────────────────────────────
const SORT_ORDER={overdue:0,modify:1,active:2,confirm:3,making:4,done:99};
function filterTask(t,type){
  if(S.filter.brand!=='all'&&t.brand!==S.filter.brand)return false;
  if(S.filter.type!=='all'&&S.filter.type!==type)return false;
  if(S.filter.search){
    const q=S.filter.search.toLowerCase();
    if(!(t.brand||'').toLowerCase().includes(q)&&!(t.product||'').toLowerCase().includes(q))return false;
  }
  return true;
}

function renderTasks(){
  const sort=(arr,type)=>arr.slice().sort((a,b)=>{
    const sa=SORT_ORDER[taskStatus(a,type).key]??5;
    const sb=SORT_ORDER[taskStatus(b,type).key]??5;
    return sa-sb;
  });
  const vSorted = sort(S.tasks.video.filter(t=>filterTask(t,'video')),'video');
  const tSorted = sort(S.tasks.thread.filter(t=>filterTask(t,'thread')),'thread');
  const vActive = vSorted.filter(t=>taskStatus(t,'video').key!=='done');
  const tActive = tSorted.filter(t=>taskStatus(t,'thread').key!=='done');
  const vDone   = vSorted.filter(t=>taskStatus(t,'video').key==='done');
  const tDone   = tSorted.filter(t=>taskStatus(t,'thread').key==='done');

  let out='';
  const sf=S.filter.type;
  if(sf==='all'||sf==='video'){
    out+=`<div class="section-hdr video-hdr">🎬 影音企劃 <span style="font-size:10px;font-weight:400;color:var(--ink3)">${vActive.length} 進行中 · ${vDone.length} 完成</span></div>`;
    out+=vActive.length?vActive.map(t=>taskRowHTML(t,'video')).join(''):'<div class="empty">無進行中影音任務</div>';
    if(vDone.length){
      out+=`<details style="margin-top:6px"><summary style="font-size:11px;color:var(--ink3);cursor:pointer;padding:4px 0">已完成 ${vDone.length} 個 ▾</summary>`;
      out+=vDone.map(t=>taskRowHTML(t,'video')).join('');
      out+='</details>';
    }
  }
  if(sf==='all'||sf==='thread'){
    out+=`<div class="section-hdr thread-hdr" style="margin-top:${sf==='all'?'24px':'0'}">🧵 脆企劃 <span style="font-size:10px;font-weight:400;color:var(--ink3)">${tActive.length} 進行中 · ${tDone.length} 完成</span></div>`;
    out+=tActive.length?tActive.map(t=>taskRowHTML(t,'thread')).join(''):'<div class="empty">無進行中脆任務</div>';
    if(tDone.length){
      out+=`<details style="margin-top:6px"><summary style="font-size:11px;color:var(--ink3);cursor:pointer;padding:4px 0">已完成 ${tDone.length} 個 ▾</summary>`;
      out+=tDone.map(t=>taskRowHTML(t,'thread')).join('');
      out+='</details>';
    }
  }
  g('taskWall').innerHTML=out||'<div class="empty">沒有符合條件的任務</div>';
}

function taskRowHTML(t, type) {
  const st = taskStatus(t, type);
  const id = 'tr_'+t.taskId.replace(/[^a-zA-Z0-9]/g,'_')+'_'+type;

  const personaText = t['人設'] || t.persona || '';
  // ★ 回饋：影音優先影片回饋，脆用客戶回饋，取前40字
  const feedbackRaw = (type==='video' && (t['影片-回饋']||t.videoFeedback))
    ? (t['影片-回饋']||t.videoFeedback)
    : (t['客戶回饋']||t.clientFeedback||'');
  const feedbackText = feedbackRaw.trim();

  return `<div class="task-row ${st.key}" id="${id}">
    <div class="task-head">
      <span class="task-id" title="${html(t.taskId)}" style="user-select:text;cursor:text;font-size:9px;flex-shrink:0">${html(t.taskId)}</span>
      <span class="task-brand">${html(t.brand||'')}</span>
      <span class="task-product">${html(t.product||'')}</span>
      ${personaText?`<span class="task-persona">👤 ${html(personaText)}</span>`:''}
      ${feedbackText?`<span class="task-feedback" title="${html(feedbackText)}">💬 ${html(feedbackText.slice(0,40))}</span>`:''}
      <span class="badge ${st.cls}">${st.label}</span>
      <span class="task-due">${html(t.dueDate||'')}</span>
      <button class="edit-btn" onclick="toggleEdit('${id}','${esc(t.taskId)}','${type}')" title="編輯">✏️ 編輯</button>
    </div>
    <div class="edit-panel" id="ep_${id}">
      <div class="loader">載入詳情中…</div>
    </div>
  </div>`;
}

// ─── 展開 / 收合 ───────────────────────────────────────────
// _openPanels 記「已載入過」，儲存後 refresh 要清掉重抓
const _openPanels = {};
// 只有編輯按鈕才展開，bar 本身不做任何事
async function toggleEdit(rowId, taskId, type) {
  const row = document.getElementById(rowId);
  if (!row) return;
  const isOpen = row.classList.contains('open');
  if (isOpen) {
    row.classList.remove('open');
    return;
  }
  row.classList.add('open');
  if (!_openPanels[rowId]) {
    _openPanels[rowId] = true;
    await loadEditPanel(rowId, taskId, type);
  }
}
// 保留 toggleTask 相容舊呼叫
function toggleTask(rowId, taskId, type) { return toggleEdit(rowId, taskId, type); }

async function loadEditPanel(rowId, taskId, type) {
  const ep = document.getElementById('ep_'+rowId);
  if (!ep) return;
  try {
    // ★ tasks 已從客戶表帶完整資料，直接用，不打 taskDetail
    const t = (type==='video'
      ? S.tasks.video.find(x=>x.taskId===taskId)
      : S.tasks.thread.find(x=>x.taskId===taskId)) || {};

    // 只打 productInfo（較輕量）
    const brand   = t.brand   || '';
    const product = t.product || '';
    let prodInfo = null;
    if (brand && product) {
      prodInfo = await api('productInfo',{brand,product}).catch(()=>null);
    }
    ep.innerHTML = buildEditPanel(rowId, taskId, type, t, prodInfo);
  } catch(e) {
    ep.innerHTML = `<div class="empty">載入失敗：${html(e.message)}</div>`;
  }
}

function buildEditPanel(rowId, taskId, type, t, prodInfo) {
  const isVideo = type==='video';
  const personas = isVideo ? VIDEO_PERSONAS : THREAD_PERSONAS;
  const sheetName = t.sheetName || '';

  const sel = (id, opts, val) =>
    `<select id="${id}">${opts.map(o=>`<option value="${html(o)}"${o===val?' selected':''}>${o?html(o):'— 不選 —'}</option>`).join('')}</select>`;
  const ta = (id, val, ph='') =>
    `<textarea id="${id}" placeholder="${ph}">${html(val||'')}</textarea>`;
  const linkField = (id, url, label) =>
    `<div class="link-field-wrap"><input type="text" id="${id}" value="${html(url||'')}" placeholder="貼上連結（空白=不更新）"/></div>`
    +(url?`<div class="link-preview"><a href="${html(url)}" target="_blank">▶ 開啟${html(label)}</a></div>`:'');

  let out = `<div class="edit-inner"><div class="ep-grid">`;

  out += `<div><div class="field-label">狀態</div>${sel('ep_status_'+rowId, STATUS_OPTS, t['狀態']||t.status||'')}</div>`;
  out += `<div><div class="field-label">人設</div>${sel('ep_persona_'+rowId, personas, t['人設']||t.persona||'')}</div>`;
  out += `<div class="ep-full"><div class="field-label">腳本內容</div>${ta('ep_content_'+rowId, t['腳本內容']||t.scriptContent||'')}</div>`;

  if (isVideo) {
    out += `<div class="ep-full"><div class="field-label">畫面說明</div>${ta('ep_img_'+rowId, t['畫面']||'')}</div>`;
    out += `<div class="ep-full"><div class="field-label">客戶回饋</div>${ta('ep_cfeedback_'+rowId, t['客戶回饋']||t.clientFeedback||'')}  </div>`;
    out += `<hr class="ep-divider"/><div class="ep-section-label">🎬 影片區</div>`;
    out += `<div><div class="field-label">影片狀態</div>${sel('ep_vstatus_'+rowId, VSTATUS_OPTS, t['影片-狀態']||t.videoStatus||'')}</div>`;
    out += `<div><div class="field-label">影片回饋</div>${ta('ep_vfeedback_'+rowId, t['影片-回饋']||t.videoFeedback||'','可空白')}</div>`;
    out += `<div class="ep-full"><div class="field-label">影片連結（空白不覆蓋）</div>${linkField('ep_vlink_'+rowId, t['影片連結']||'','影片')}</div>`;
  } else {
    ['圖片1','圖片2','圖片3'].forEach((f,i)=>{
      // 只有真實 URL 才顯示連結，純文字（如"圖片1"）表示 HYPERLINK 顯示名稱，不是真實連結
      const rawVal = t[f]||'';
      const isRealUrl = rawVal.startsWith('http');
      const displayUrl = isRealUrl ? rawVal : '';
      const hasLink = isRealUrl || (rawVal && !rawVal.startsWith('http'));
      out += `<div><div class="field-label">${f}${hasLink&&!isRealUrl?' <span style="color:var(--green);font-size:9px">（已有連結，貼新連結才更新）</span>':''}</div>
        ${linkField('ep_img'+(i+1)+'_'+rowId, displayUrl, f)}
        ${isRealUrl&&rawVal.includes('thumbnail')?`<br><img class="img-thumb" src="${html(rawVal)}" onclick="openLB('${esc(rawVal)}')" loading="lazy"/>`:''}
      </div>`;
    });
    out += `<div class="ep-full"><div class="field-label">留言</div>${ta('ep_comment_'+rowId, t['留言']||'')}</div>`;
    // 留言內圖片：只顯示1欄（表頭只有1個）
    const cimgKey = t['留言內圖片1'] !== undefined ? '留言內圖片1' : '留言內圖片';
    out += `<div class="ep-full"><div class="field-label">留言內圖片</div>${linkField('ep_cimg1_'+rowId, t[cimgKey]||'', '留言內圖片')}</div>`;
    out += `<div class="ep-full"><div class="field-label">客戶回饋</div>${ta('ep_cfeedback_'+rowId, t['客戶回饋']||t.clientFeedback||'')}  </div>`;
  }

  if (prodInfo && (prodInfo.info||prodInfo.notes)) {
    out += `<div class="ep-full"><div class="field-label">商品摘要</div><div class="product-summary">
      ${prodInfo.info?`<strong>商品資訊</strong>${html(prodInfo.info)}`:''}
      ${prodInfo.notes?`<strong style="margin-top:8px">注意事項</strong>${html(prodInfo.notes)}`:''}
    </div></div>`;
  }

  out += `</div></div>`;
  out += `<div class="edit-actions">
    <button class="btn btn-save" id="ep_savebtn_${rowId}" onclick="saveTask('${rowId}','${esc(taskId)}','${type}','${esc(sheetName)}')">💾 儲存送出</button>
    <button class="btn btn-cancel" onclick="toggleTask('${rowId}','${esc(taskId)}','${type}')">收合</button>
    <span class="saving-msg" id="ep_msg_${rowId}"></span>
  </div>`;
  return out;
}

// ─── 儲存 ──────────────────────────────────────────────────
async function saveTask(rowId, taskId, type, sheetName) {
  const btn = document.getElementById('ep_savebtn_'+rowId);
  if (!btn) return;
  btn.disabled=true; btn.textContent='儲存中…';

  const isVideo = type==='video';
  const fields={}, linkFields={};
  const gv = id => { const el=document.getElementById(id); return el?el.value:''; };

  // ★ 空白狀態不寫入（避免覆蓋）
  const statusVal = gv('ep_status_'+rowId);
  if (statusVal) fields['狀態'] = statusVal;

  const personaVal = gv('ep_persona_'+rowId);
  if (personaVal) fields['人設'] = personaVal;

  fields['腳本內容'] = gv('ep_content_'+rowId);
  const cfVal = gv('ep_cfeedback_'+rowId);
  if (cfVal !== undefined) fields['客戶回饋'] = cfVal;

  if (isVideo) {
    fields['畫面'] = gv('ep_img_'+rowId);
    const vsVal = gv('ep_vstatus_'+rowId);
    if (vsVal) fields['影片-狀態'] = vsVal;
    fields['影片-回饋'] = gv('ep_vfeedback_'+rowId);
    const vlink = gv('ep_vlink_'+rowId).trim();
    if (vlink) linkFields['影片連結'] = vlink;
  } else {
    fields['留言'] = gv('ep_comment_'+rowId);
    ['圖片1','圖片2','圖片3'].forEach((f,i)=>{ const u=gv('ep_img'+(i+1)+'_'+rowId).trim(); if(u)linkFields[f]=u; });
    const cimgVal = gv('ep_cimg1_'+rowId).trim();
    if (cimgVal) {
      linkFields['留言內圖片1'] = cimgVal;
      linkFields['留言內圖片'] = cimgVal; // 相容兩種表頭
    }
  }

  try {
    await apiPost({ action:'save', taskId, type, sheetName, fields:JSON.stringify(fields), linkFields:JSON.stringify(linkFields) });
    toast('✅ 已儲存');
    delete _openPanels['tr_'+taskId.replace(/[^a-zA-Z0-9]/g,'_')+'_'+type];
    const arr = isVideo ? S.tasks.video : S.tasks.thread;
    const idx = arr.findIndex(t=>t.taskId===taskId);
    if (idx!==-1) {
      if (statusVal) arr[idx].status = statusVal;
      if (personaVal) arr[idx].persona = personaVal;
      if (isVideo && fields['影片-狀態']) arr[idx].videoStatus = fields['影片-狀態'];
    }
    renderStats(); renderTasks();
  } catch(e) {
    toast('⚠️ 儲存失敗：'+e.message);
    btn.disabled=false; btn.textContent='💾 儲存送出';
  }
}

// ─── UI Helpers ────────────────────────────────────────────
function show(id) {
  ['sceneTeam','sceneMember','sceneTask'].forEach(s=>{
    const el=document.getElementById(s);
    if(el) el.style.display=s===id?'':'none';
  });
  updateCrumbs();
}
function updateCrumbs() {
  const parts=[{label:'任務牆',fn:S.team?`window.location='?'`:null}];
  if(S.team)   parts.push({label:S.team,   fn:S.member?`goTeam()`:null});
  if(S.member) parts.push({label:S.member, fn:null});
  g('crumbs').innerHTML=parts.map((p,i,arr)=>{
    const isCur=i===arr.length-1;
    if(isCur) return `<span class="crumb current">${html(p.label)}</span>`;
    if(p.fn)  return `<span class="crumb link" onclick="${p.fn}">${html(p.label)}</span>`;
    return `<span class="crumb">${html(p.label)}</span>`;
  }).join('<span class="crumb-sep"> › </span>');
}
function goTeam(){
  S.member='';
  history.pushState(null,'',S.team?`?team=${encodeURIComponent(S.team)}`:'?');
  loadMembers(S.team);
}
function g(id){return document.getElementById(id);}
function html(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function esc(s){return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function openLB(url){g('lbImg').src=url;g('lightbox').classList.add('show');}
function closeLB(){g('lightbox').classList.remove('show');}
function toast(msg){
  const el=g('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}


// ─── 小隊整體進度概覽（成員選擇頁顯示）───────────────────
async function renderTeamOverview(members, team) {
  if (!members.length) { g('teamOverview').innerHTML = ''; return; }
  g('teamOverview').innerHTML = '<div class="loader">載入小隊進度中…</div>';
  try {
    // 並行抓所有成員的任務
    const results = await Promise.all(members.map(m => api('tasks',{member:m}).catch(()=>({video:[],thread:[]}))));
    const memberStats = members.map((m, i) => {
      const d = results[i];
      const all = [
        ...(d.video||[]).map(t=>({t,type:'video'})),
        ...(d.thread||[]).map(t=>({t,type:'thread'}))
      ];
      const counts = {overdue:0,modify:0,active:0,confirm:0,making:0,done:0};
      all.forEach(({t,type})=>{ const s=taskStatus(t,type); counts[s.key]=(counts[s.key]||0)+1; });
      const total = all.length;
      return { member:m, counts, total, tasks: all };
    });

    const today = new Date(); today.setHours(0,0,0,0);
    const days = [];
    for (let i=-3; i<=13; i++) { const d=new Date(today); d.setDate(d.getDate()+i); days.push(d); }

    let html_out = `<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px">
      <div style="padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:700;color:var(--ink2)">📊 小隊本週進度</div>
      <div style="padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap">`;

    memberStats.forEach(({member, counts}) => {
      html_out += `<div style="flex:1;min-width:140px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px">
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">${html(member)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${counts.overdue?`<span style="background:var(--red-light);color:var(--red);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">逾期 ${counts.overdue}</span>`:''}
          ${counts.modify?`<span style="background:var(--yellow-light);color:var(--yellow);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">待修 ${counts.modify}</span>`:''}
          ${counts.active?`<span style="background:var(--blue-light);color:var(--blue);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">進行 ${counts.active}</span>`:''}
          ${counts.confirm?`<span style="background:var(--purple-light);color:var(--purple);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">確認中 ${counts.confirm}</span>`:''}
          ${counts.making?`<span style="background:var(--bg2);color:var(--ink2);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">製作中 ${counts.making}</span>`:''}
          ${counts.done?`<span style="background:var(--green-light);color:var(--green);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">完成 ${counts.done}</span>`:''}
          ${!counts.overdue&&!counts.modify&&!counts.active&&!counts.confirm&&!counts.making&&!counts.done?'<span style="color:var(--ink3);font-size:11px">無任務</span>':''}
        </div>
      </div>`;
    });
    html_out += `</div></div>`;

    // 小隊甘特
    const allTasks = memberStats.flatMap(({member,tasks})=>tasks.map(x=>({...x,memberName:member})));
    const activeTasks = allTasks.filter(({t,type})=>taskStatus(t,type).key!=='done').slice(0,20);

    if (activeTasks.length > 0) {
      const ths = `<tr><th style="text-align:left;min-width:80px;padding-left:10px">成員</th><th style="text-align:left;min-width:120px">任務</th>${
        days.map(d=>{
          const isToday=d.getTime()===today.getTime();
          return `<th class="${isToday?'today-col':''}" style="min-width:26px;font-size:9px">${d.getMonth()+1}/${d.getDate()}</th>`;
        }).join('')}</tr>`;
      const trs = activeTasks.map(({t,type,memberName})=>{
        const due=parseDateTW(t.dueDate);
        const st=taskStatus(t,type);
        const label=`${t.brand||''} ${t.product||''}`.trim();
        const cells=days.map(d=>{
          if(!due)return '<td></td>';
          if(Math.abs((due.getTime()-d.getTime())/86400000)<0.5){
            const cls=st.key==='overdue'?'gbar-overdue':type==='video'?'gbar-video':'gbar-thread';
            return `<td><div class="gantt-bar ${cls}" title="${html(label)}">${html(label.slice(0,8))}</div></td>`;
          }
          return '<td></td>';
        }).join('');
        return `<tr><td class="row-label" style="background:var(--surface)">${html(memberName)}</td><td class="row-label">${html(label)}</td>${cells}</tr>`;
      }).join('');

      html_out += `<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)">
        <div style="padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:700;color:var(--ink2)">📅 兩週甘特（進行中任務）</div>
        <div style="overflow-x:auto"><table class="gantt-table"><thead>${ths}</thead><tbody>${trs}</tbody></table></div>
      </div>`;
    }

    g('teamOverview').innerHTML = html_out;
  } catch(e) {
    g('teamOverview').innerHTML = `<div class="empty">進度載入失敗：${html(e.message)}</div>`;
  }
}

init();
</script>
